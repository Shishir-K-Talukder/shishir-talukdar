    <style>
      :root{--bg:hsl(220 20% 7%);--fg:hsl(150 10% 92%);--card:hsl(220 18% 10%);--border:hsl(220 15% 18%);--primary:hsl(142 71% 45%)}
      *{margin:0;padding:0;box-sizing:border-box}
      body{background:var(--bg);color:var(--fg);font-family:'IBM Plex Sans',system-ui,sans-serif}
      #root{min-height:100vh}
      .shell-nav{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(13,17,23,.7);backdrop-filter:blur(12px);border-bottom:1px solid transparent;z-index:50;display:flex;align-items:center;padding:0 2rem}
      .shell-nav span{font-size:14px;font-weight:700;color:var(--fg)}
      .shell-hero{max-width:1400px;margin:0 auto;padding:5rem 2rem 2rem;display:grid;gap:1rem;grid-template-columns:1fr 1fr}
      .shell-card{border-radius:1.5rem;border:1px solid var(--border);background:var(--card);padding:1.5rem}
      .shell-main{grid-column:1/3;grid-row:1/3;min-height:280px}
      .shell-pulse{animation:sp .8s ease-in-out infinite alternate}
      @keyframes sp{from{opacity:.4}to{opacity:.15}}
      .sp-line{height:12px;border-radius:6px;background:var(--border);margin-bottom:10px}
      .sp-line.w75{width:75%}.sp-line.w50{width:50%}.sp-line.w30{width:30%}
      @media(max-width:768px){.shell-hero{grid-template-columns:1fr}.shell-main{grid-column:1;grid-row:auto}}
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Static shell for instant FCP — replaced by React on hydration -->
      <div id="loading-shell">
        <div class="shell-nav"><span>Shishir K. Talukder</span></div>
        <div class="shell-hero">
          <div class="shell-card shell-main shell-pulse">
            <div class="sp-line w30" style="margin-top:20px"></div>
            <div class="sp-line w75" style="height:28px;margin-top:16px"></div>
            <div class="sp-line w50" style="margin-top:12px"></div>
          </div>
          <div class="shell-card shell-pulse" style="min-height:100px">
            <div class="sp-line w50" style="margin-top:20px"></div>
          </div>
          <div class="shell-card shell-pulse" style="min-height:100px">
            <div class="sp-line w50" style="margin-top:20px"></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
